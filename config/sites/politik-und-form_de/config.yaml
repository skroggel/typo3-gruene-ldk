accelerator:
  htmlMinifier:
    enable: 1
  pseudoCdn:
    enable: 0
  criticalCss:
    enable: 0
acceleratorVariants:
  -
    htmlMinifier:
      enable: 0
    condition: 'applicationContext == "Development/Local"'
base: 'https://www.politik-und-form.de/'
baseVariants:
  -
    base: 'https://politik-und-form.ddev.site:8443/'
    condition: 'applicationContext == "Development/Local"'
  -
    base: 'https://test.politik-und-form.de/'
    condition: 'applicationContext == "Production/Staging"'
dependencies:
  - madj2k/site-politik-und-form
errorHandling:
  -
    errorCode: 404
    errorHandler: Page
    errorContentSource: 't3://page?uid=72'
klarokratie:
  klaro:
    enable: true
    customCss: 'EXT:site_politik_und_form/Resources/Public/Css/klaro.css'
    config: EXT:klarokratie/Resources/Public/Config/KlaroConfigMinimal.js
    includes:
      - EXT:klarokratie/Resources/Public/Config/Includes/GoogleAnalytics.js
      - EXT:klarokratie/Resources/Public/Config/Includes/YouTube.js
  googleAnalytics:
    enable: 1
    useTagManager: 0
    tagId: 'G-K6PZWNFDJG'
languages:
  -
    title: Deutsch
    enabled: true
    languageId: 0
    base: /
    locale: de_DE.UTF-8
    navigationTitle: ''
    flag: de
    hreflang: ''
    websiteTitle: ''
  -
    title: Englisch
    enabled: false
    locale: en_GB.UTF-8
    hreflang: ''
    base: /en/
    navigationTitle: ''
    fallbackType: strict
    fallbacks: ''
    flag: en-us-gb
    languageId: 1
rootPageId: 63
routeEnhancers:
  PageTypeSuffix:
    type: PageType
    default: ''
    index: ''
    map:
      sitemap.xml: 1533906435
websiteTitle: Politik & Form
imports:
  -
    resource: 'EXT:site_default/Configuration/Routes/Search.yaml'
  -
    resource: 'EXT:site_default/Configuration/Routes/News.yaml'
