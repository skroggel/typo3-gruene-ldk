<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true"
>

    <div class="socialmedia">
        <p class="socialmedia-headline headline h5 text-color-inverted" role="heading">
            <f:translate key="socialMedia.headline" extensionName="siteDefault" />
        </p>
        <div class="socialmedia-list text-color-inverted">
            <f:for each="{
            instagram: 'https://www.instagram.com/der_steffen_k',
            youtube: 'https://www.youtube.com/@DerSteffenK',
            tiktok: 'https://www.tiktok.com/@der_steffen',
        }" as="url" key="icon">
                <a href="{url}"
                   title="{f:translate(key: 'socialMedia.{icon}', extensionName:'siteDefault')}"
                   target="_blank"
                   class="socialmedia-link link"
                   rel="nofollow"><span class="icon-{icon ->f:format.case(mode: 'lower')} icon"></span></a>
            </f:for>
        </div>
    </div>
</html>
