<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true"
>

    <f:comment><!-- Check if element is used as standalone or as embedded element --></f:comment>
    <f:variable name="headerLayout" value="{data.header_layout}" />
    <f:if condition="{data.rawRecord.foreign_table_parent_uid} || {data.rawRecord.tx_news_related_news}">
        <f:then>

            <f:variable name="classAddition" value=" g-0" />
            <f:if condition="{headerLayout} == 0">
                <f:variable name="headerLayout" value="3" />
            </f:if>

            <div class="csp-block csp-not-last">
                <f:if condition="{data.rawRecord.tx_news_related_news}">

                    <f:comment><!-- Check if element is used in news --></f:comment>
                    <f:then>
                        <div class="container-xxxl">
                            <f:render section="Inner" arguments="{_all}" />
                        </div>
                    </f:then>

                    <f:comment><!-- Check if element is used in e.g. accordion --></f:comment>
                    <f:else>
                        <div class="container-fluid g-0">
                            <f:render section="Inner" arguments="{_all}" />
                        </div>
                    </f:else>
                </f:if>
            </div>
        </f:then>

        <f:else>
            <section class="text-image csp-section csp-section-padding csp-not-last fullwidth-1 bg-color-{data.madj2k_background_color} js-appear-on-scroll" id="c{data.uid}">
                <div class="container-xxxl">
                    <f:render section="Inner" arguments="{_all}" />
                </div>
            </section>
        </f:else>
    </f:if>


    <f:comment><!-- ==================================== --></f:comment>
    <f:section name="Inner">

        <f:if condition="{data.madj2k_header}">
            <div class="row{classAddition}">
                <div class="col-12">
                    <f:render partial="Utils/Header"
                              arguments="{header: data.madj2k_header, wrapClass: 'text-image-headline',
                                          layout: headerLayout, settings: settings}" />

                </div>
            </div>
        </f:if>

        <div class="row{classAddition}">
            <div class="col-12 col-lg-6 col-xl-7 {f:if(condition: '{data.madj2k_image_orientation} == \'left\'', then: 'order-2 ps-lg-5 offset-xxl-1', else:'pe-lg-5')}">
                <f:render partial="Utils/Bodytext"
                          arguments="{text: data.bodytext, wrapClass: 'text-image-text'}" />

            </div>
            <div class="col-12 col-lg-6 col-xl-5 col-xxl-4 {f:if(condition: '{data.madj2k_image_orientation} == \'left\'', then: 'order-1 mb-5 mb-lg-0', else:'mt-5 mt-lg-0 offset-xxl-1 ')}">
                <f:render partial="Utils/Media"
                          arguments="{file: data.assets.0,
                                      wrapClass: 'text-image-image {f:if(condition: \'{data.madj2k_image_orientation} == \"left\"\', then: \'variant-left\')}',
                                      settings: settings}" />
            </div>
        </div>
    </f:section>

</html>
