<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true"
>
    <f:if condition="{data.rawRecord.foreign_table_parent_uid} || {data.rawRecord.tx_news_related_news}">
        <f:then>
            <div class="banner fullwidth-1 pt-5 pb-5 bg-color-{data.madj2k_background_color_extended} js-appear-on-scroll">
                <f:if condition="{headerLayout} == 0">
                    <f:variable name="headerLayout" value="3" />
                </f:if>
                <f:render section="Inner" arguments="{_all}" />
            </div>
        </f:then>
        <f:else>
            <section class="banner fullwidth-1 pt-5 pb-5 bg-color-{data.madj2k_background_color_extended} js-appear-on-scroll" id="c{data.uid}">
                <div class="container-xxxl">
                    <div class="row">
                        <div class="col-12 col-xl-10">
                            <f:render section="Inner" arguments="{_all}" />
                        </div>
                    </div>
                </div>
            </section>
        </f:else>
    </f:if>


    <f:comment><!-- ==================================== --></f:comment>
    <f:section name="Inner">

        <div class="container-xxxl">
            <div class="row">
                <div class="col-12">

                    <div class="banner-inner">
                        <f:render partial="Utils/Header"
                                  arguments="{header: data.madj2k_header, wrapClass: 'banner-headline',
                                              class: 'text-color-{data.madj2k_text_color}',
                                              layout: headerLayout, settings: settings}" />

                        <f:render partial="Utils/Subheader"
                                  arguments="{subheader: data.madj2k_subheader, wrapClass: 'banner-subheader',
                                              settings: settings}" />

                        <f:if condition="{f:uri.typolink(parameter: data.madj2k_cta_link)}">
                            <f:render partial="Utils/Cta"
                                      arguments="{
                                            label: data.madj2k_cta_label,
                                            link: data.madj2k_cta_link,
                                            type: 'white',
                                            class: 'banner-cta',
                                            settings: settings
                                  }" />
                        </f:if>
                    </div>
                </div>
            </div>
        </div>
    </f:section>

</html>
