    <html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true"
>
    <section class="news-list csp-section csp-not-last csp-section-padding fullwidth-1 bg-color-{data.madj2k_background_color} js-appear-on-scroll" id="c{data.uid}">

        <div class="container-xxxl">
            <div class="row">
                <div class="col-12">

                    <f:render partial="Utils/Header"
                              arguments="{header: data.madj2k_header, wrapClass: 'news-list-headline',
                                          layout: headerLayout, settings: settings}" />

                    <f:render partial="Utils/Bodytext"
                              arguments="{text: data.bodytext, wrapClass: 'news-list-text  mb-7'}" />
                </div>
            </div>
        </div>

        <div class="fullwidth-inner">
            <f:if condition="{data._grids.plugin_news_list}">
                <f:if condition="{data._grids.plugin_news_list.0.content -> f:format.trim()}">
                    <f:for each="{data._grids.plugin_news_list}" as="item" iteration="i">
                        <f:comment><!-- {item.data} contains the Content Block data object. --></f:comment>
                        <f:format.raw>{item.content}</f:format.raw>
                    </f:for>
                </f:if>
            </f:if>
        </div>

    </section>
</html>
