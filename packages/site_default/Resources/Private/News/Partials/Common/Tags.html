<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:madj2k="http://typo3.org/ns/Madj2k/SiteDefault/ViewHelpers/Format"
      data-namespace-typo3-fluid="true">

   <div class="tag-list">
        <f:spaceless>
            <div class="tag">
                <span class="icon-calendar"></span><span><madj2k:timeRange
                startDate="{newsItem.datetime}"
                stopDate="{newsItem.txSitedefaultDatetimeEnd}"
                dateFormat="{f:translate(key:'news.dateFormat', extensionName:'site_default')}"
                timeFormat="{f:translate(key:'news.timeFormat', extensionName:'site_default')}"
            /></span>
            </div>
            <f:if condition="{newsItem.txSitedefaultLocation}">
                <div class="tag">
                    <span class="icon-location"></span><span>{newsItem.txSitedefaultLocation}</span>
                </div>
            </f:if>
            <f:if condition="{newsItem.categories}">
                <div class="tag">
                    <span class="icon-category"></span><span><f:render partial="Category/ItemsImploded"
                                                                       arguments="{categories:newsItem.categories, settings: customSettings}" /></span>
                </div>
            </f:if>
        </f:spaceless>
    </div>

</html>
