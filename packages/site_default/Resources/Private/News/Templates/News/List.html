<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
	  xmlns:n="http://typo3.org/ns/GeorgRinger/News/ViewHelpers"
      xmlns:siteDefault="http://typo3.org/ns/Madj2k/SiteDefault/ViewHelpers"
      data-namespace-typo3-fluid="true">

	<f:layout name="List" />

    <f:section name="TopicSlider">
        <f:if condition="{pagination.paginator.paginatedItems}">
            <div class="swiper-wrapper">
                <f:for each="{pagination.paginator.paginatedItems}" as="newsItem" iteration="iterator">

                    <f:variable name="categories"
                                value="{f:render(partial: 'Category/ItemsImploded',
                                        arguments:'{categories: newsItem.categories, settings: settings, customSettings: settings.list._custom.topicSlider}')}" />

                    <f:if condition="{newsItem.externalurl}">
                        <f:then>
                            <f:variable name="linkToNewsDetail" value="0" />
                            <f:variable name="link" value="{newsItem.externalurl}" />
                        </f:then>
                        <f:else>
                            <f:variable name="linkToNewsDetail" value="{settings.detailPid}" />
                            <f:variable name="link" value="{newsItem.uid}" />
                        </f:else>
                    </f:if>

                    <f:render partial="Utils/Tile" arguments="{
                         image: newsItem.txSitedefaultImagePreview.0,
                         header: newsItem.title,
                         subline: categories,
                         text: newsItem.teaser,
                         wrapClass: 'swiper-slide tile-slider',
                         linkToNewsDetail: linkToNewsDetail,
                         link: link,
                         settings: settings.list._custom.topicSlider
                    }" />
                </f:for>
            </div>

            <!-- If we need navigation buttons -->
            <f:if condition="{pagination.paginator.paginatedItems -> f:count() > 1}">
                <div class="topic-slider-navigation mt-5 mb-2">
                    <f:render partial="Utils/Cta"
                              arguments="{
                                    label: '{f:translate(key: \'label.nextTopic\', extensionName: \'SiteDefault\')}',
                                    type: 'inverted',
                                    class: 'topic-slider-cta',
                                    icon: 'reload',
                                    settings: settings.list._custom.topicSlider
                              }" />
                </div>
            </f:if>
        </f:if>

    </f:section>

    <f:comment><!-- ============================================================= --> </f:comment>

	<f:section name="Default">

		<!--TYPO3SEARCH_end-->
		<f:if condition="{news}">
			<f:then>
				<div class="news-list">

                    <f:if condition="{settings.list.paginate.insertAbove}">
                        <f:render partial="List/Pagination"
                                  arguments="{pagination: pagination.pagination, paginator: pagination.paginator,
                                              settings: settings, customSettings: settings.list._custom.groupedList}" />
                    </f:if>

                    <f:for each="{siteDefault:news.groupByMonth(news:news, sortDirection:'asc')}" as="group" iteration="iterator">

                        <f:if condition="{group.isFirstOfYear}">
                            <f:then>
                                <f:variable name="formatedDate" ><siteDefault:format.localizedDate
                                    date="{group.date}"
                                    format="{f:translate(key:'news.headerDateFormatFirstOfYear', extensionName:'siteDefault')}" /></f:variable>
                            </f:then>
                            <f:else>
                                <f:variable name="formatedDate" ><siteDefault:format.localizedDate
                                    date="{group.date}"
                                    format="{f:translate(key:'news.headerDateFormat', extensionName:'siteDefault')}" /></f:variable>
                            </f:else>
                        </f:if>

                        <div class="news-list-group{f:if(condition: iterator.isEven, then: ' is-even')}">
                            <f:render partial="Utils/Header"
                                      arguments="{header: formatedDate, wrapClass: 'news-list-header',
                                                  settings: settings.list._custom.groupedList}" />

                            <f:for each="{group.items}" as="newsItem">
                                <f:render partial="List/ListItem"
                                          arguments="{newsItem: newsItem, settings: settings, customSettings: settings.list._custom.groupedList}" />
                            </f:for>
                        </div>
                    </f:for>

                    <f:if condition="{settings.list.paginate.insertBelow}">
                        <f:render partial="List/Pagination"
                                  arguments="{pagination: pagination.pagination, paginator: pagination.paginator,
                                              settings: settings, customSettings: settings.list._custom.groupedList}" />
                    </f:if>
				</div>
			</f:then>
			<f:else>
				<div class="no-news-found">
					<f:translate key="list_nonewsfound" />
				</div>
			</f:else>
		</f:if>
		<!--TYPO3SEARCH_begin-->
	</f:section>

</html>
